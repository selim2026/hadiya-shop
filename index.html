<!DOCTYPE html>
<html>
<head>
    <title>Hadiya Islamic Shop</title>

    <style>
        body{
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        h1{
            background: darkgreen;
            color: white;
            padding: 20px;
            margin: 0;
            text-align: center;
            font-size: 35px;
        }

        nav{
            background: #0f6e63;
            padding: 15px;
            text-align: center;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        nav a:hover{
            color: yellow;
        }

        .hero{
            background: linear-gradient(to right, darkgreen, #25D366);
            color: white;
            padding: 80px 20px;
            text-align: center;
        }

        .hero h2{
            font-size: 45px;
            margin: 0;
        }

        .hero p{
            font-size: 20px;
            margin-top: 15px;
        }

        .btn{
            background: #128C7E;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover{
            background: #0f6e63;
        }

        .products{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            padding: 50px 20px;
        }

        .card{
            background: white;
            width: 300px;          /* বড় করা হয়েছে */
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-10px);
        }

        .card img{
            width: 250px;          /* ছবি বড় */
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
        }

        footer{
            background: darkgreen;
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 16px;
        }

        .whatsapp-float{
            position: fixed;
            width: 70px;
            height: 70px;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            border-radius: 50%;
            text-align: center;
            box-shadow: 2px 2px 10px gray;
        }

        .whatsapp-float img{
            width: 40px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h1>Hadiya Islamic Shop</h1>

<div class="hero">
    <h2>Welcome to Hadiya Islamic Shop</h2>
    <p>Best Islamic Products in Bangladesh</p>
    <button class="btn">Shop Now</button>
</div>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
    <a href="#">About</a>
</nav>

<div class="products">

    <div class="card">
        <img src="quran.jpg">
        <h2>Quran Sharif</h2>
        <p><b>Price: 500 Tk</b></p>
        <a href="https://wa.me/8801838709662?text=I want to buy Quran Sharif" target="_blank">
            <button class="btn">Buy Now</button>
        </a>
    </div>

    <div class="card">
        <img src="book.jpg">
        <h2>Islamic Book</h2>
        <p><b>Price: 300 Tk</b></p>
        <a href="https://wa.me/8801838709662?text=I want to buy Islamic Book" target="_blank">
            <button class="btn">Buy Now</button>
        </a>
    </div>

    <div class="card">
        <img src="cap.jpg">
        <h2>Prayer Cap</h2>
        <p><b>Price: 150 Tk</b></p>
        <a href="https://wa.me/8801838709662?text=I want to buy Prayer Cap" target="_blank">
            <button class="btn">Buy Now</button>
        </a>
    </div>

</div>

<a href="https://wa.me/8801838709662" class="whatsapp-float" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<footer>
    <p>Hadiya Islamic Shop</p>
    <p>Phone: 01838709662</p>
    <p>Location: Bangladesh</p>
    <p>© 2026 All Rights Reserved</p>
</footer>

</body>
</html>
