<!DOCTYPE html>
<html>
<head>
    <title>Hadiya Shop</title>
    <style>
        body {
            background: linear-gradient(to right, #f0f2f5, #e6f2ff);
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .product-card {
            width: 250px;
            padding: 15px;
            margin: 15px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            background: white;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
        }

        .btn {
            background-color: #128C7E;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #0f6e63;
        }
    </style>
</head>
<body>

<h1>Welcome to Hadiya Shop</h1>

<div class="product-card">
    <h3>Product 1</h3>
    <p>Price: 500৳</p>
    <button class="btn">Buy Now</button>
</div>

<div class="product-card">
    <h3>Product 2</h3>
    <p>Price: 700৳</p>
    <button class="btn">Buy Now</button>
</div>

</body>
</html>
